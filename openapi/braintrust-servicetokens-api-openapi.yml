openapi: 3.1.1
info:
  version: 1.0.0
  title: Braintrust Acls ServiceTokens API
  description: 'API specification for the backend data server. The API is hosted globally at

    https://api.braintrust.dev or in your own environment.


    You can access the OpenAPI spec for this API at https://github.com/braintrustdata/braintrust-openapi.'
  license:
    name: Apache 2.0
servers:
- url: https://api.braintrust.dev
security:
- bearerAuth: []
- {}
tags:
- name: ServiceTokens
paths:
  /v1/service_token:
    delete:
      operationId: deleteServiceToken
      tags:
      - ServiceTokens
      description: Delete a single service_token
      summary: Delete single service_token
      security:
      - bearerAuth: []
      - {}
      requestBody:
        description: Parameters which uniquely specify the service_token to delete
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteServiceToken'
      responses:
        '200':
          description: Returns the deleted service_token object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceToken'
        '400':
          description: The request was unacceptable, often due to missing a required parameter
          content:
            text/plain:
              schema:
                type: string
            application/json:
              schema:
                nullable: true
        '401':
          description: No valid API key provided
          content:
            text/plain:
              schema:
                type: string
            application/json:
              schema:
                nullable: true
        '403':
          description: The API key doesn’t have permissions to perform the request
          content:
            text/plain:
              schema:
                type: string
            application/json:
              schema:
                nullable: true
        '429':
          description: Too many requests hit the API too quickly. We recommend an exponential backoff of your requests
          headers:
            Retry-After:
              schema:
                type: string
          content:
            text/plain:
              schema:
                type: string
            application/json:
              schema:
                nullable: true
        '500':
          description: Something went wrong on Braintrust's end. (These are rare.)
          content:
            text/plain:
              schema:
                type: string
            application/json:
              schema:
                nullable: true
    get:
      operationId: getServiceToken
      tags:
      - ServiceTokens
      description: 'List out all service tokens. They are sorted by creation date, with the most recently-created tokens coming first.


        To create service tokens, organization owners can go to [**Settings > Service tokens**](https://www.braintrust.dev/app/~/configuration/org/service-tokens) in the Braintrust UI.'
      summary: List service_tokens
      security:
      - bearerAuth: []
      - {}
      parameters:
      - $ref: '#/components/parameters/AppLimitParam'
      - $ref: '#/components/parameters/StartingAfter'
      - $ref: '#/components/parameters/EndingBefore'
      - $ref: '#/components/parameters/Ids'
      - $ref: '#/components/parameters/ServiceTokenName'
      - $ref: '#/components/parameters/OrgName'
      responses:
        '200':
          description: Returns a list of service_token objects
          content:
            application/json:
              schema:
                type: object
                properties:
                  objects:
                    type: array
                    items:
                      $ref: '#/components/schemas/ServiceToken'
                    description: A list of service_token objects
                required:
                - objects
                additionalProperties: false
        '400':
          description: The request was unacceptable, often due to missing a required parameter
          content:
            text/plain:
              schema:
                type: string
            application/json:
              schema:
                nullable: true
        '401':
          description: No valid API key provided
          content:
            text/plain:
              schema:
                type: string
            application/json:
              schema:
                nullable: true
        '403':
          description: The API key doesn’t have permissions to perform the request
          content:
            text/plain:
              schema:
                type: string
            application/json:
              schema:
                nullable: true
        '429':
          description: Too many requests hit the API too quickly. We recommend an exponential backoff of your requests
          headers:
            Retry-After:
              schema:
                type: string
          content:
            text/plain:
              schema:
                type: string
            application/json:
              schema:
                nullable: true
        '500':
          description: Something went wrong on Braintrust's end. (These are rare.)
          content:
            text/plain:
              schema:
                type: string
            application/json:
              schema:
                nullable: true
  /v1/service_token/{service_token_id}:
    get:
      operationId: getServiceTokenId
      tags:
      - ServiceTokens
      description: Get a service_token object by its id
      summary: Get service_token
      security:
      - bearerAuth: []
      - {}
      parameters:
      - $ref: '#/components/parameters/ServiceTokenIdParam'
      responses:
        '200':
          description: Returns the service_token object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceToken'
        '400':
          description: The request was unacceptable, often due to missing a required parameter
          content:
            text/plain:
              schema:
                type: string
            application/json:
              schema:
                nullable: true
        '401':
          description: No valid API key provided
          content:
            text/plain:
              schema:
                type: string
            application/json:
              schema:
                nullable: true
        '403':
          description: The API key doesn’t have permissions to perform the request
          content:
            text/plain:
              schema:
                type: string
            application/json:
              schema:
                nullable: true
        '429':
          description: Too many requests hit the API too quickly. We recommend an exponential backoff of your requests
          headers:
            Retry-After:
              schema:
                type: string
          content:
            text/plain:
              schema:
                type: string
            application/json:
              schema:
                nullable: true
        '500':
          description: Something went wrong on Braintrust's end. (These are rare.)
          content:
            text/plain:
              schema:
                type: string
            application/json:
              schema:
                nullable: true
    delete:
      operationId: deleteServiceTokenId
      tags:
      - ServiceTokens
      description: Delete a service_token object by its id
      summary: Delete service_token
      security:
      - bearerAuth: []
      - {}
      parameters:
      - $ref: '#/components/parameters/ServiceTokenIdParam'
      responses:
        '200':
          description: Returns the deleted service_token object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceToken'
        '400':
          description: The request was unacceptable, often due to missing a required parameter
          content:
            text/plain:
              schema:
                type: string
            application/json:
              schema:
                nullable: true
        '401':
