      - $ref: '#/components/parameters/OrgName'
      responses:
        '200':
          description: Returns a list of dataset_snapshot objects
          content:
            application/json:
              schema:
                type: object
                properties:
                  objects:
                    type: array
                    items:
                      $ref: '#/components/schemas/DatasetSnapshot'
                    description: A list of dataset_snapshot objects
                required:
