components:
  schemas:
    DatasetSnapshotIdParam:
      type: string
      format: uuid
      description: DatasetSnapshot id
    PatchDatasetSnapshot:
      type: object
      properties:
        name:
          type: string
          nullable: true
          description: Name of the dataset snapshot
        description:
          type: string
          nullable: true
          description: Textual description of the dataset snapshot
    DatasetSnapshotName:
      type: string
      description: Name of the dataset_snapshot to search for
    AppLimitParam:
      type: integer
      nullable: true
      minimum: 0
      description: Limit the number of objects to return
    StartingAfter:
      type: string
      format: uuid
      description: 'Pagination cursor id.


        For example, if the final item in the last page you fetched had an id of `foo`, pass `starting_after=foo` to fetch the next page. Note: you may only pass one of `starting_after` and `ending_before`'
    OrgName:
      type: string
      description: Filter search results to within a particular organization
    EndingBefore:
      type: string
      format: uuid
      description: 'Pagination cursor id.


        For example, if the initial item in the last page you fetched had an id of `foo`, pass `ending_before=foo` to fetch the previous page. Note: you may only pass one of `starting_after` and `ending_before`'
    DatasetSnapshot:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the dataset snapshot
        dataset_id:
          type: string
          format: uuid
          description: Unique identifier for the dataset that this snapshot belongs to
        name:
          type: string
          description: Name of the dataset snapshot
        description:
          type: string
          nullable: true
        xact_id:
          type: string
          description: Transaction id of the brainstore version at the time of the snapshot
        created:
          type: string
          nullable: true
          format: date-time
          description: Date of dataset snapshot creation
      required:
      - id
      - dataset_id
      - name
      - description
      - xact_id
      - created
    Ids:
      anyOf:
      - type: string
        format: uuid
      - type: array
        items:
          type: string
          format: uuid
      description: Filter search results to a particular set of object IDs. To specify a list of IDs, include the query param multiple times
    CreateDatasetSnapshot:
      type: object
      properties:
        dataset_id:
          type: string
          format: uuid
          description: Unique identifier for the dataset that this snapshot belongs to
        name:
          type: string
          minLength: 1
          description: Name of the dataset snapshot
        description:
          type: string
          nullable: true
          description: Textual description of the dataset snapshot
        xact_id:
          type: string
          minLength: 1
          description: Transaction id of the brainstore version at the time of the snapshot
      required:
      - dataset_id
      - name
      - xact_id
  parameters:
    Ids:
      schema:
        $ref: '#/components/schemas/Ids'
      required: false
      description: Filter search results to a particular set of object IDs. To specify a list of IDs, include the query param multiple times
      name: ids
      in: query
    AppLimitParam:
      schema:
        $ref: '#/components/schemas/AppLimitParam'
      required: false
      description: Limit the number of objects to return
      name: limit
      in: query
    EndingBefore:
      schema:
        $ref: '#/components/schemas/EndingBefore'
      required: false
      description: 'Pagination cursor id.


        For example, if the initial item in the last page you fetched had an id of `foo`, pass `ending_before=foo` to fetch the previous page. Note: you may only pass one of `starting_after` and `ending_before`'
      name: ending_before
      in: query
    OrgName:
      schema:
        $ref: '#/components/schemas/OrgName'
      required: false
      description: Filter search results to within a particular organization
      name: org_name
      in: query
      allowReserved: true
    DatasetSnapshotName:
      schema:
        $ref: '#/components/schemas/DatasetSnapshotName'
      required: false
      description: Name of the dataset_snapshot to search for
      name: dataset_snapshot_name
      in: query
      allowReserved: true
    StartingAfter:
      schema:
        $ref: '#/components/schemas/StartingAfter'
      required: false
      description: 'Pagination cursor id.


        For example, if the final item in the last page you fetched had an id of `foo`, pass `starting_after=foo` to fetch the next page. Note: you may only pass one of `starting_after` and `ending_before`'
      name: starting_after
      in: query
    DatasetSnapshotIdParam:
      schema:
        $ref: '#/components/schemas/DatasetSnapshotIdParam'
      required: true
      description: DatasetSnapshot id
      name: dataset_snapshot_id
      in: path
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key or JWT
      description: 'Most Braintrust endpoints are authenticated by providing your API key as a header `Authorization: Bearer [api_key]` to your HTTP request. You can create an API key in the Braintrust [organization settings page](https://www.braintrustdata.com/app/settings?subroute=api-keys).'
