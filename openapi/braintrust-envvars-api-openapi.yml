components:
  schemas:
    EnvVarObjectId:
      type: string
      format: uuid
      description: The id of the object the environment variable is scoped for
    EnvVarIdParam:
      type: string
      format: uuid
      description: EnvVar id
    AppLimitParam:
      type: integer
      nullable: true
      minimum: 0
      description: Limit the number of objects to return
    EnvVarName:
      type: string
      description: Name of the env_var to search for
    EnvVarObjectType:
      type: string
      enum:
      - organization
      - project
      - function
      description: The type of the object the environment variable is scoped for
    EnvVar:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the environment variable
        object_type:
          type: string
          enum:
          - organization
          - project
          - function
          description: The type of the object the environment variable is scoped for
        object_id:
          type: string
          format: uuid
          description: The id of the object the environment variable is scoped for
        name:
          type: string
          description: The name of the environment variable
        created:
          type: string
          nullable: true
          format: date-time
          description: Date of environment variable creation
        secret_updated_at:
          type: string
          nullable: true
          format: date-time
          description: Date of last update to the encrypted secret value itself
        secret_updated_by_user_id:
          type: string
          nullable: true
          format: uuid
          description: User id of the last update to the encrypted secret value
        used:
          type: string
          nullable: true
          format: date-time
          description: Date the environment variable was last used
        metadata:
          type: object
          nullable: true
          additionalProperties:
            nullable: true
          description: Optional metadata associated with the environment variable when managed via the function secrets API
        preview_secret:
          type: string
          nullable: true
          description: Redacted preview of the stored secret value
        secret_type:
          type: string
          nullable: true
          description: Optional classification for the secret (for example, the AI provider name)
        secret_category:
          type: string
          enum:
          - env_var
          - ai_provider
          - sandbox_provider
          default: env_var
          description: 'The category of the secret: env_var for regular environment variables, ai_provider for AI provider API keys'
      required:
      - id
      - object_type
      - object_id
      - name
    Ids:
      anyOf:
      - type: string
        format: uuid
      - type: array
        items:
          type: string
          format: uuid
      description: Filter search results to a particular set of object IDs. To specify a list of IDs, include the query param multiple times
  parameters:
    EnvVarName:
      schema:
        $ref: '#/components/schemas/EnvVarName'
      required: false
      description: Name of the env_var to search for
      name: env_var_name
      in: query
      allowReserved: true
    Ids:
      schema:
        $ref: '#/components/schemas/Ids'
      required: false
      description: Filter search results to a particular set of object IDs. To specify a list of IDs, include the query param multiple times
      name: ids
      in: query
    AppLimitParam:
      schema:
        $ref: '#/components/schemas/AppLimitParam'
      required: false
      description: Limit the number of objects to return
      name: limit
      in: query
    EnvVarIdParam:
      schema:
        $ref: '#/components/schemas/EnvVarIdParam'
      required: true
      description: EnvVar id
      name: env_var_id
      in: path
    EnvVarObjectId:
      schema:
        $ref: '#/components/schemas/EnvVarObjectId'
      required: false
      description: The id of the object the environment variable is scoped for
      name: object_id
      in: query
    EnvVarObjectType:
      schema:
        $ref: '#/components/schemas/EnvVarObjectType'
      required: false
      description: The type of the object the environment variable is scoped for
      name: object_type
      in: query
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key or JWT
      description: 'Most Braintrust endpoints are authenticated by providing your API key as a header `Authorization: Bearer [api_key]` to your HTTP request. You can create an API key in the Braintrust [organization settings page](https://www.braintrustdata.com/app/settings?subroute=api-keys).'
