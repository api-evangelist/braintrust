      - $ref: '#/components/parameters/OrgName'
      responses:
        '200':
          description: Returns a list of mcp_server objects
          content:
            application/json:
              schema:
                type: object
                properties:
                  objects:
                    type: array
                    items:
                      $ref: '#/components/schemas/MCPServer'
                    description: A list of mcp_server objects
                required:
