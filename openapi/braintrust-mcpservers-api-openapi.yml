    get:
      operationId: getMcpServer
      tags:
      - McpServers
      description: List out all mcp_servers. The mcp_servers are sorted by creation date, with the most recently-created mcp_servers coming first
      summary: List mcp_servers
      security:
      - bearerAuth: []
      - {}
