    delete:
      operationId: deleteGroupId
      tags:
      - Groups
      description: Delete a group object by its id
      summary: Delete group
      security:
      - bearerAuth: []
      - {}
      parameters:
      - $ref: '#/components/parameters/GroupIdParam'
      responses:
        '200':
          description: Returns the deleted group object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '400':
